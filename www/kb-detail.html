<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3L · 详情</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0f0f1a; color: #e0e0e0; min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            border-bottom-width: 2px; border-bottom-style: solid;
            padding: 30px 20px; text-align: center;
        }
        .header h1 { font-size: 22px; color: #fff; letter-spacing: 2px; }
        .header .back {
            display: inline-block; margin-top: 12px; font-size: 13px;
            text-decoration: none; padding: 6px 16px; border: 1px solid #3a3a5e;
            border-radius: 8px; transition: all .2s;
        }
        .header .back:hover { background: #2a2a4e; }
        .container { max-width: 800px; margin: 0 auto; padding: 30px 20px; }
        .article {
            background: #1a1a2e; border: 1px solid #2a2a4e; border-radius: 16px;
            padding: 40px; line-height: 1.9; font-size: 15px;
        }
        .article h1 { color: #fff; font-size: 24px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #2a2a4e; }
        .article h2 { font-size: 18px; margin: 28px 0 12px; }
        .article h3 { font-size: 15px; margin: 20px 0 8px; }
        .article p { margin-bottom: 12px; }
        .article strong { color: #fff; }
        .article blockquote {
            border-left: 3px solid #22c55e; padding: 8px 16px; margin: 12px 0;
            background: rgba(34,197,94,0.05); border-radius: 0 8px 8px 0; color: #ccc;
        }
        .article ul, .article ol { margin: 8px 0 12px 20px; }
        .article li { margin-bottom: 4px; }
        .article table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 14px; }
        .article th, .article td { border: 1px solid #2a2a4e; padding: 8px 12px; text-align: left; }
        .article th { background: #0f0f1a; font-weight: bold; }
        .article td { color: #ccc; }
        .article code { background: #0f0f1a; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
        .article hr { border: none; border-top: 1px solid #2a2a4e; margin: 20px 0; }
        .loading { text-align: center; padding: 40px; color: #888; }
        .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid #333; border-top-color: #22c55e; border-radius: 50%; animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-box { text-align: center; padding: 60px; color: #e94560; }
        @media (max-width: 640px) { .article { padding: 20px; font-size: 14px; } }
    </style>
</head>
<body>
    <div id="nav-top"></div>
    <div class="header" id="page-header">
        <h1 id="page-title">加载中...</h1>
        <a class="back" id="back-link" href="#">← 返回</a>
    </div>
    <div class="container">
        <div id="article-content" class="loading"><div class="spinner"></div><br>加载中...</div>
    </div>
    <script>
        (async function() {
            const params = new URLSearchParams(window.location.search);
            const file = params.get('file');
            const type = params.get('type') || 'tips';
            if (!file) {
                document.getElementById('article-content').innerHTML = '<div class="error-box">❌ 缺少 file 参数</div>';
                return;
            }
            // Set back link and color based on type
            const isIndustry = type === 'industry';
            const backHref = isIndustry ? '/industry.html' : '/tips.html';
            document.getElementById('back-link').href = backHref;
            const header = document.getElementById('page-header');
            header.style.borderBottomColor = isIndustry ? '#22c55e' : '#f59e0b';
            try {
                const res = await fetch(`/api/kb/content?type=${type}&file=${encodeURIComponent(file)}`);
                const data = await res.json();
                if (data.error) {
                    document.getElementById('article-content').innerHTML = `<div class="error-box">❌ ${data.error}</div>`;
                    return;
                }
                document.getElementById('page-title').textContent = data.title;
                const html = renderMarkdown(data.content);
                document.getElementById('article-content').innerHTML = `<div class="article">${html}</div>`;
            } catch(e) {
                document.getElementById('article-content').innerHTML = `<div class="error-box">❌ 加载失败: ${e.message}</div>`;
            }
        })();

        function renderMarkdown(text) {
            let html = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            html = html.replace(/^---+\s*$/gm, '<hr>');
            html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
            html = html.replace(/^\|(.+)\|$/gm, function(m) {
                if (m.includes('---')) return m;
                const cells = m.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
                return `<tr>${cells}</tr>`;
            });
            html = html.replace(/((?:<tr>.*?<\/tr>\n?)+)/g, function(m) {
                if (!m.includes('<table>')) return '<table>' + m + '</table>';
                return m;
            });
            html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
            html = html.replace(/((?:<li>.*?<\/li>\n?)+)/g, '<ul>$1</ul>');
            html = html.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');
            html = html.replace(/\n\n+/g, '</p><p>');
            html = html.replace(/\n/g, ' ');
            if (!html.startsWith('<')) html = '<p>' + html + '</p>';
            html = html.replace(/<\/p><p>/g, '\n');
            html = html.replace(/<\/?p>/g, '\n');
            html = html.replace(/\n{3,}/g, '\n\n');
            // Auto-link URLs
            html = html.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" style="color:#22c55e;text-decoration:underline;">$1</a>');
            return html.trim();
        }
    </script>
    <script src="/nav.js"></script>
</body>
</html>
