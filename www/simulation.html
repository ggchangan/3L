        /* Summary cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }
        .summary-card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);

            padding: 16px;

        .summary-card .num.pos { color: #f44336; }
        .summary-card .label { font-size: 11px; color: #888; margin-top: 4px; }

        /* Week cards */
        .week-card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 1px solid #2a2a4e;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 16px;

        .week-card table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .week-card th {
            text-align: left;
            color: #4ecdc4;
            padding: 6px 8px;
            border-bottom: 1px solid #2a2a4e;
            font-weight: 600;
        }
        .week-card td {
            padding: 5px 8px;
            border-bottom: 1px solid #1a1a2e;
            color: #ccc;
        }
        .week-card td.buy { color: #f44336; }
        .week-card td.sell { color: #4caf50; }
        .week-card td.half { color: #ffd700; }

        /* Section title */
        .section-title {
            font-size: 16px;
            color: #4ecdc4;
            margin: 28px 0 14px;
            padding-bottom: 6px;
            border-bottom: 1px solid #2a2a4e;

            display: flex; gap: 12px; justify-content: center; margin-bottom: 20px;
        }
        .nav-bar a {
            color: #4ecdc4; text-decoration: none; font-size: 13px;

        .footer {
            text-align: center; padding: 24px; color: #555; font-size: 12px;
            border-top: 1px solid #1a1a2e; margin-top: 30px;
        }

        @media (max-width: 600px) {
