<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>持仓管理 · 私密</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-bottom: 2px solid #e94560;
            padding: 20px;
            text-align: center;
        }
        .header h1 { font-size: 22px; color: #e94560; }
        .header .hint { color: #666; font-size: 12px; margin-top: 6px; }
        .header .update-time { color: #4ecdc4; font-size: 11px; margin-top: 4px; }
        .container { max-width: 740px; margin: 0 auto; padding: 20px; }
        .summary-bar {
            display: flex;
            justify-content: center;
            gap: 24px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 1px solid #2a2a4e;
            border-radius: 10px;
            padding: 14px 20px;
            margin-bottom: 16px;
            text-align: center;
        }
        .summary-bar .item { font-size: 13px; }
        .summary-bar .label { color: #888; }
        .summary-bar .value { color: #4ecdc4; font-weight: bold; display: block; margin-top: 2px; }
        .card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 1px solid #2a2a4e;
            border-radius: 12px;
            padding: 4px;
        }
        .card table {
            width: 100%;
            border-collapse: collapse;
        }
        .card th {
            background: #e94560;
            color: #fff;
            padding: 8px 10px;
            font-size: 13px;
            text-align: left;
        }
        .card td {
            padding: 8px 10px;
            font-size: 13px;
            border-bottom: 1px solid #2a2a4e;
        }
        .card tr:hover td { background: rgba(255,255,255,0.04); }
        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 10px;
            color: #000;
        }
        .tag.semiconductor { background: #ff6b6b; }
        .tag.compute { background: #4ecdc4; }
        .tag.robot { background: #ffd700; }
        .tag.energy { background: #e94560; }
        .tag.pharma { background: #2196f3; }
        .tag.space { background: #ff9800; }
        .bar-bg {
            background: #2a2a4e;
            border-radius: 6px;
            height: 6px;
            width: 80px;
            display: inline-block;
            vertical-align: middle;
        }
        .bar-fill {
            height: 6px;
            border-radius: 6px;
            transition: width 0.5s;
        }
        .footer { text-align: center; padding: 20px; color: #444; font-size: 11px; }
        .empty { color: #666; text-align: center; padding: 40px; font-size: 14px; }
        .loading { color: #666; text-align: center; padding: 40px; font-size: 14px; }
        .error { color: #ff6b6b; text-align: center; padding: 40px; font-size: 14px; }
        .refresh-btn {
            display: inline-block;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 6px 14px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 10px;
        }
        .refresh-btn:hover { background: #ff6b81; }
        .back-link {
            display: inline-block;
            color: #4ecdc4;
            text-decoration: none;
            font-size: 12px;
            margin-top: 14px;
        }
        #tradesArea table th {
            background: transparent;
            border-bottom: 1px solid #2a2a4e;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔒 持仓管理 · 私密</h1>
        <div class="hint">仅跟踪仓位占比 · 暂不追踪金额</div>
        <div class="update-time" id="updateTime">加载中...</div>
    </div>
    <div class="container">
        <!-- 简单汇总条 -->
        <div id="summaryArea">
            <div class="summary-bar">
                <div class="item"><span class="label">股票</span><span class="value" id="stockCount">-</span></div>
                <div class="item"><span class="label">现金占比</span><span class="value" id="cashRatio">-</span></div>
                <div class="item"><span class="label">最大单只</span><span class="value" id="maxRatio">-</span></div>
            </div>
        </div>

        <!-- 持仓表格 -->
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>股票</th>
                        <th>代码</th>
                        <th>方向</th>
                        <th>仓位</th>
                        <th>分布</th>
                    </tr>
                </thead>
                <tbody id="holdingsBody">
                    <tr><td colspan="6" class="loading">加载中...</td></tr>
                </tbody>
            </table>
        </div>

        

        <!-- 交易记录 -->
        <div class="card" style="margin-top:16px;padding:16px 4px;">
            <h2 style="color:#ffd700; font-size:16px; margin-bottom:12px; padding:0 10px;">📝 交易记录</h2>
            <div id="tradesArea">
                <div class="loading" style="text-align:center;padding:20px;color:#666;">加载中...</div>
            </div>
        </div>

        <div style="text-align:center;">
            <a class="back-link" href="/">← 返回主看板</a>
        </div>
    </div>
    <div class="footer">仅你可见 · URL请保密</div>

    <script>
    async function loadHoldings() {
        const body = document.getElementById('holdingsBody');
        const updateTime = document.getElementById('updateTime');

        body.innerHTML = '<tr><td colspan="6" class="loading">加载中...</td></tr>';

        try {
            const resp = await fetch('/api/holdings?_=' + Date.now());
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const data = await resp.json();

            updateTime.textContent = '📅 更新于 ' + (data.update_date || '未知');

            // 更新汇总
            const holdings = data.holdings || [];
            document.getElementById('stockCount').textContent = holdings.length + ' 只';
            document.getElementById('cashRatio').textContent = (data.cash_ratio || 0).toFixed(1) + '%';
            let maxR = 0;
            holdings.forEach(h => { if (h.ratio > maxR) maxR = h.ratio; });
            document.getElementById('maxRatio').textContent = maxR.toFixed(1) + '%';

            if (holdings.length === 0) {
                body.innerHTML = '<tr><td colspan="6" class="empty">暂无持仓</td></tr>';
                return;
            }

            // 方向标签样式映射
            const dirMap = {
                '半导体': { cls: 'semiconductor', label: '半导体' },
                '算力': { cls: 'compute', label: '算力' },
                '机器人': { cls: 'robot', label: '机器人' },
                '新能源': { cls: 'energy', label: '新能源' },
                '创新药': { cls: 'pharma', label: '创新药' },
                '商业航天': { cls: 'space', label: '航天' },
                'AI应用': { cls: 'semiconductor', label: 'AI' },
                '资源股': { cls: 'space', label: '资源' }
            };

            holdings.sort((a, b) => b.ratio - a.ratio);

            body.innerHTML = holdings.map((h, i) => {
                const barColor = h.ratio >= 10 ? '#e94560' : h.ratio >= 6 ? '#ffd700' : '#4ecdc4';
                const dir = dirMap[h.direction] || { cls: 'compute', label: h.direction || '-' };
                return `<tr>
                    <td style="color:#666">${i + 1}</td>
                    <td><strong>${h.name}</strong></td>
                    <td style="color:#888">${h.code || '-'}</td>
                    <td><span class="tag ${dir.cls}">${dir.label}</span></td>
                    <td style="font-family:monospace;font-weight:bold;">${(h.ratio || 0).toFixed(1)}%</td>
                    <td>
                        <div class="bar-bg">
                            <div class="bar-fill" style="width:${Math.min(h.ratio, 100)}%;background:${barColor}"></div>
                        </div>
                    </td>
                </tr>`;
            }).join('');

        } catch (err) {
            body.innerHTML = `<tr><td colspan="6" class="error">❌ 加载失败: ${err.message}</td></tr>`;
            updateTime.textContent = '⚠️ 加载失败';
        }
    }

    async function loadTrades() {
        const area = document.getElementById('tradesArea');
        try {
            const resp = await fetch('/api/trades?_=' + Date.now());
            const data = await resp.json();
            const trades = data.trades || [];
            if (trades.length === 0) {
                area.innerHTML = '<div style="text-align:center;padding:20px;color:#666;">暂无交易记录</div>';
                return;
            }
            let html = '<table style="width:100%;border-collapse:collapse;font-size:12px;">';
            html += '<tr style="border-bottom:1px solid #2a2a4e;">' +
                '<th style="padding:6px 8px;text-align:left;color:#888;">日期</th>' +
                '<th style="padding:6px 8px;text-align:left;color:#888;">类型</th>' +
                '<th style="padding:6px 8px;text-align:left;color:#888;">股票</th>' +
                '<th style="padding:6px 8px;text-align:left;color:#888;">比例</th>' +
                '<th style="padding:6px 8px;text-align:left;color:#888;">原因</th>' +
                '</tr>';
            trades.reverse().forEach(t => {
                const typeColor = t.type === '卖出' ? '#e94560' : '#4ecdc4';
                html += `<tr style="border-bottom:1px solid #1a1a2e;">
                    <td style="padding:6px 8px;color:#aaa;">${t.date}</td>
                    <td style="padding:6px 8px;color:${typeColor};font-weight:bold;">${t.type}</td>
                    <td style="padding:6px 8px;">${t.name} <span style="color:#666;font-size:10px;">${t.code}</span></td>
                    <td style="padding:6px 8px;color:#ffd700;">${t.ratio}</td>
                    <td style="padding:6px 8px;color:#888;">${t.reason || '-'}</td>
                </tr>`;
            });
            html += '</table>';
            area.innerHTML = html;
        } catch (err) {
            area.innerHTML = `<div style="text-align:center;padding:20px;color:#e94560;">❌ 失败: ${err.message}</div>`;
        }
    }

    // 页面加载
    loadHoldings();
    loadTrades();
    </script>
</body>
</html>
