<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3L 个股分析</title>
<style>
:root {
  --bg: #0f0f14;
  --card: #1a1a24;
  --border: #2a2a3a;
  --text: #c8c8d4;
  --text-dim: #6b6b80;
  --accent: #e94560;
  --green: #22c55e;
  --orange: #f59e0b;
  --blue: #3b82f6;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 { font-size: 18px; color: #fff; margin-bottom: 10px; }
.search-box {
  max-width: 500px;
  margin: 0 auto;
  display: flex;
  gap: 8px;
}
.search-box input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  color: var(--text);
  font-size: 14px;
  outline: none;
}
.search-box input:focus { border-color: var(--accent); }
.search-box button {
  background: var(--accent);
  border: none;
  border-radius: 6px;
  padding: 8px 16px;
  color: #fff;
  cursor: pointer;
  font-size: 14px;
}
.search-box button:hover { opacity: 0.85; }

/* 自动补全搜索下拉 */
.sa-search-wrap { position: relative; flex: 1; }
.sa-search-wrap input { width: 100%; }
.sa-search-results {
  position: absolute; top: 100%; left: 0; right: 0;
  background: #1a1a30; border: 1px solid #2a2a4e; border-radius: 6px;
  margin-top: 4px; max-height: 260px; overflow-y: auto; z-index: 100;
}
.sa-search-item {
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  display: flex; justify-content: space-between; align-items: center;
}
.sa-search-item:hover { background: #2a2a4e; }
.sa-search-item .code { color: #666; margin-left: 6px; font-size: 11px; }
.sa-search-item .dir { color: #555; font-size: 11px; }

.main {
  max-width: 900px;
  margin: 0 auto;
  padding: 24px;
}

/* 加载 / 错误 */
.loading { text-align: center; padding: 60px 0; color: var(--text-dim); }
.loading .spinner {
  display: inline-block;
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin-bottom: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error {
  background: #2d1a1a;
  border: 1px solid #5c2a2a;
  border-radius: 8px;
  padding: 16px;
  color: #f87171;
  text-align: center;
}

/* 卡片 */
.section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
}
.section h2 { font-size: 16px; margin-bottom: 12px; color: #fff; }
.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 8px;
}
.info-item {
  background: var(--bg);
  border-radius: 6px;
  padding: 10px 12px;
}
.info-item .label { font-size: 11px; color: var(--text-dim); }
.info-item .value { font-size: 15px; font-weight: 600; margin-top: 2px; }
.value.up { color: var(--green); }
.value.down { color: var(--accent); }
.value.trend { color: var(--blue); }
.value.trend-badge {
  background: var(--blue); color: #fff; padding: 1px 8px; border-radius: 4px; font-size: 12px;
}
.value._3l-badge {
  background: var(--accent); color: #fff; padding: 1px 8px; border-radius: 4px; font-size: 12px;
}

/* 买点详情 */
.buy-detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 4px; }
.buy-detail-item { font-size: 13px; padding: 4px 8px; background: var(--bg); border-radius: 4px; }
.buy-detail-item .label { color: var(--text-dim); margin-right: 4px; }

/* 诊断区块 */
.diagnosis-section { background: #1a1a2e; margin-bottom: 14px; }
.diagnosis-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.d-score { font-size: 26px; font-weight: 700; line-height: 1; }
.d-grade { font-size: 13px; font-weight: 700; color: #fff; padding: 2px 10px; border-radius: 4px; }
.d-label { font-size: 12px; color: var(--text-dim); flex: 1; }
.d-cost { font-size: 10px; color: #555; }
.d-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.d-card { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 10px; text-align: center; }
.d-card.soon { opacity: 0.4; border-style: dashed; }
.dci { font-size: 20px; margin-bottom: 2px; }
.dcl { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
.dcs { font-size: 18px; font-weight: 700; color: #e0e0e0; }
.dcr { font-size: 11px; font-weight: 600; margin-top: 1px; }
.dcr2 { margin-top: 4px; }
.dcre { font-size: 10px; color: #666; line-height: 1.4; }
.dcp { font-size: 11px; color: #555; margin-top: 8px; }

/* 结论 */
.conclusion {
  background: var(--bg);
  border-left: 3px solid var(--accent);
  padding: 12px 16px;
  border-radius: 0 6px 6px 0;
  line-height: 1.6;
  font-size: 14px;
}

/* 响应式 */
@media (max-width: 600px) {
  .header { flex-direction: column; padding: 12px; }
  .search-box { max-width: 100%; }
  .info-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div class="header">
  <h1>📈 3L 个股分析</h1>
  <div class="search-box">
    <div class="sa-search-wrap">
      <input id="q" placeholder="股票代码或名称 (如 300750)" onkeydown="if(event.key==='Enter') search()" onblur="setTimeout(()=>hideResults(),200)">
      <div id="saResults" class="sa-search-results" style="display:none"></div>
    </div>
    <button onclick="search()">分析</button>
  </div>
</div>
<div class="main" id="app">
  <div class="loading" style="border:none;background:transparent">🔍 输入股票代码或名称开始分析</div>
</div>
<script>
const API = '/api/stock-analysis';
let searchTimer = null;

// 自动补全
document.getElementById('q').addEventListener('input', function() {
  clearTimeout(searchTimer);
  const q = this.value.trim();
  if (!q || q.length < 1) { document.getElementById('saResults').style.display = 'none'; return; }
  searchTimer = setTimeout(async () => {
    try {
      const r = await fetch('/api/watchlist/search?q=' + encodeURIComponent(q));
      const data = await r.json();
      const results = data.results || [];
      const el = document.getElementById('saResults');
      if (results.length === 0) { el.style.display = 'none'; return; }
      el.innerHTML = results.map(s =>
        `<div class="sa-search-item" onmousedown="pickStock('${s.code}')">
          <span>${s.name} <span class="code">${s.code}</span></span>
          <span class="dir">${s.direction || ''}</span>
        </div>`
      ).join('');
      el.style.display = 'block';
    } catch(e) { document.getElementById('saResults').style.display = 'none'; }
  }, 200);
});

function hideResults() { document.getElementById('saResults').style.display = 'none'; }

function pickStock(code) {
  document.getElementById('q').value = code;
  hideResults();
  search();
}

async function search() {
  const q = document.getElementById('q').value.trim();
  if (!q) return;
  document.getElementById('app').innerHTML = '<div class="loading"><div class="spinner"></div><div>分析中...</div></div>';
  try {
    const r = await fetch(API + '?q=' + encodeURIComponent(q));
    const data = await r.json();
    render(data);
  } catch(e) {
    document.getElementById('app').innerHTML = '<div class="error">请求失败: ' + e.message + '</div>';
  }
}

function render(d) {
  if (d.error) {
    document.getElementById('app').innerHTML = '<div class="error">' + d.error + '</div>';
    return;
  }
  const changeCls = d.change >= 0 ? 'up' : 'down';
  const isTrend = d.trend_stock;
  const sysCls = isTrend ? 'trend-badge' : '_3l-badge';
  const sysLabel = isTrend ? '趋势' : '3L';

  let html = '';

  // 基本信息
  html += '<div class="section"><h2>' + d.name + ' (' + d.code + ')</h2>';
  html += '<div class="info-grid">';
  html += item('价格', d.price, '');
  html += item('涨幅', d.change + '%', changeCls);
  html += item('结构', d.structure || '--', '');
  html += item('阶段', d.stage || '--', '');
  html += item('均线', d.ema || '--', '');
  html += item('系统', '<span class="value ' + sysCls + '">' + sysLabel + '</span>', '');
  html += item('信号', d.signal || 'hold', '');
  html += item('主线', d.mainline_level || '--', '');
  html += item('板块', d.sector || '--', '');
  html += item('EMA5', d.ema5 || '--', '');
  html += item('EMA10', d.ema10 || '--', '');
  html += item('EMA20', d.ema20 || '--', '');
  html += item('EMA30', d.ema30 || '--', '');
  html += item('乖离率', d.deviation_pct + '%', d.deviation_pct > 0 ? 'up' : 'down');
  html += item('量比', d.vol_ratio || '--', '');
  html += item('止损', d.stop_loss || '--', '');
  html += item('止损%', (d.stop_loss_pct != null ? d.stop_loss_pct + '%' : '--'), '');
  if (d.risk_reward_ratio != null) html += item('盈亏比', d.risk_reward_ratio, '');
  if (d.buy_point) html += item('买点', d.buy_point, 'up');
  if (d.buy_score) html += item('评分', d.buy_score + '', '');
  if (d.trend_bias != null) html += item('趋势乖离', d.trend_bias + '%', d.trend_bias > 0 ? 'up' : 'down');
  html += '</div></div>';
  // K线图
  if (d.has_chart) {
    html += '<div class="section"><h2>📈 K线图</h2>';
    html += '<object data="/api/stock-chart?code=' + d.code + '&t=' + Date.now() + '" type="image/svg+xml" style="width:100%;max-width:700px;border-radius:8px;display:block;margin:0 auto">图加载中...</object>';
    html += '</div>';
  }

  // 诊断
  if (d.diagnosis && !d.diagnosis.error) {
    const di = d.diagnosis;
    const det = di.detail || {};
    const grd = di.grade || 'C';
    const gColor = grd === 'A' ? '#4ecdc4' : grd === 'B' ? '#22c55e' : grd === 'C' ? '#f59e0b' : '#e94560';
    const gLabel = grd === 'A' ? '优秀' : grd === 'B' ? '良好' : grd === 'C' ? '一般' : '较差';
    html += '<div class="section diagnosis-section">';
    html += '<div class="diagnosis-bar"><span class="d-score" style="color:' + gColor + '">' + di.total_score + '</span>';
    html += '<span class="d-grade" style="background:' + gColor + '">' + grd + '</span>';
    html += '<span class="d-label">' + gLabel + ' · ' + d.name + '</span>';
    html += '<span class="d-cost">' + (di.cost_ms || '') + 'ms</span></div>';
    html += '<div class="d-cards">';
    // 四维度
    const dims = [
      { icon: '📊', label: '趋势面', score: det.trend?.score, remarks: det.trend?.remarks },
      { icon: '💰', label: '财务面', score: det.financial?.score, remarks: det.financial?.remarks },
      { icon: '🛡️', label: '风险面', score: det.risk?.score, remarks: det.risk?.items, rl: det.risk?.level },
      { icon: '📰', label: '消息面', soon: true },
    ];
    dims.forEach(function(dim) {
      if (dim.soon) {
        html += '<div class="d-card soon"><div class="dci">' + dim.icon + '</div><div class="dcl">' + dim.label + '</div><div class="dcp">即将上线</div></div>';
        return;
      }
      html += '<div class="d-card"><div class="dci">' + dim.icon + '</div><div class="dcl">' + dim.label + '</div>';
      html += '<div class="dcs">' + (dim.score != null ? dim.score + '/40' : '--') + '</div>';
      if (dim.rl) html += '<div class="dcr" style="color:' + (dim.rl === '低风险' ? '#4ecdc4' : dim.rl === '中风险' ? '#f59e0b' : '#e94560') + '">' + dim.rl + '</div>';
      if (dim.remarks && dim.remarks.length) {
        html += '<div class="dcr2">';
        dim.remarks.slice(0, 2).forEach(function(r) { html += '<div class="dcre">' + r + '</div>'; });
        html += '</div>';
      }
      html += '</div>';
    });
    html += '</div></div>'; // end d-cards, end section
  }
  // 交易系统
  const sysInfo = [];
  sysInfo.push('交易系统: ' + (d.trend_stock ? '趋势交易' : '3L交易'));
  if (d.trading_reason) sysInfo.push(d.trading_reason);
  if (d.trend_buy && d.trend_buy.buy_type) sysInfo.push('趋势买点: ' + d.trend_buy.buy_type);
  if (d.profit_model1) sysInfo.push('盈利模式1(涨停回踩): 满足');
  if (!d.profit_model1) sysInfo.push('盈利模式1(涨停回踩): 不满足');
  if (d.conclusion) sysInfo.push('结论: ' + d.conclusion);
  if (sysInfo.length) {
    html += '<div class="section"><h2>⚙️ 交易系统</h2>';
    html += '<div class="conclusion">' + sysInfo.join('<br>') + '</div></div>';
  }

  // 买点详情
  if (d.buy_detail && Object.keys(d.buy_detail).length) {
    html += '<div class="section"><h2>🎯 买点详情 (评分: ' + d.buy_score + ')</h2><div class="buy-detail-grid">';
    for (const [k, v] of Object.entries(d.buy_detail)) {
      html += '<div class="buy-detail-item"><span class="label">' + k + ':</span> ' + (v ?? '--') + '</div>';
    }
    html += '</div></div>';
  }

  document.getElementById('app').innerHTML = html;
}

function item(label, value, cls) {
  return '<div class="info-item"><div class="label">' + label + '</div><div class="value ' + (cls || '') + '">' + (value ?? '--') + '</div></div>';
}

// 自动分析 URL 参数 ?q=xxx
const params = new URLSearchParams(location.search);
if (params.get('q')) {
  document.getElementById('q').value = params.get('q');
  search();
}
</script>
</body>
</html>
