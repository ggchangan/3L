<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30日涨幅榜</title>
<link rel="stylesheet" href="/css/stock_card.css">
<script src="/js/stock_card.js"></script>
<link rel="stylesheet" href="/css/base.css?v=1">
<link rel="stylesheet" href="/css/pages/top_gainers.css?v=1">
</head>
<body>
<div style="margin-top:10px;" id="nav-top"></div>
<div class="header">
    <h1>📈 30日涨幅榜</h1>
    <div class="subtitle">全市场个股 · 近30日涨幅排序 · 板块分布</div>
</div>

<div class="container">
    <!-- 控制栏 -->
    <div class="controls">
        <label for="datePicker">📅 截止日期</label>
        <input type="date" id="datePicker">
        <label for="limitSelect">展示</label>
        <select id="limitSelect">
            <option value="30">30只</option>
            <option value="50" selected>50只</option>
            <option value="66">66只</option>
            <option value="100">100只</option>
        </select>
        <button class="btn-query" id="queryBtn" onclick="loadData()">🔍 查询</button>
        <span id="loadingHint" style="color:#888;font-size:12px;margin-left:auto;"></span>
    </div>

    <!-- 摘要 -->
    <div class="summary" id="summaryArea" style="display:none;"></div>

    <!-- 饼图 -->
    <div class="pie-section" id="pieSection" style="display:none;">
        <div class="pie-title">📊 板块分布</div>
        <div class="pie-container">
            <div class="pie-svg-container" id="pieContainer"></div>
            <div class="pie-legend" id="pieLegend"></div>
        </div>
    </div>

    <!-- 股票列表 -->
    <div id="stockList"></div>
</div>

<div style="margin-top:10px;" id="nav-bottom"></div>

<script src="/nav.js"></script>
<script src="/js/pages/top_gainers.js?v=1"></script>
</body>
</html>
