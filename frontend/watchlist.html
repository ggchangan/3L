<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3L · 自选股管理</title>
    <link rel="stylesheet" href="/css/stock_card.css">
<link rel="stylesheet" href="/css/base.css?v=1">
<link rel="stylesheet" href="/css/pages/watchlist.css?v=1">
</head>
<body>
    <div id="nav-top"></div>
    <div class="header">
        <h1>📋 自选股管理</h1>
        <div class="subtitle">增删自选股 · 更换方向 · 实时保存</div>
        <div class="stats" id="stats">加载中...</div>
    </div>
    <div class="container">
        <!-- 添加区 -->
        <div class="add-section">
            <h3>➕ 添加自选股</h3>
            <div class="add-row">
                <input class="search-input" id="addSearch" placeholder="输入代码或名称搜索..." oninput="searchStock(this.value)">
                <select class="dir-select" id="addDir">
                    <option value="半导体">半导体</option>
                    <option value="算力">算力</option>
                    <option value="机器人">机器人</option>
                    <option value="新能源">新能源</option>
                    <option value="创新药">创新药</option>
                    <option value="AI应用">AI应用</option>
                    <option value="商业航天">商业航天</option>
                    <option value="资源股">资源股</option>
                </select>
                <button class="btn btn-green" onclick="addStock()">添加</button>
            </div>
            <div id="searchResults" class="search-results" style="display:none;"></div>
        </div>

        <!-- 工具条 -->
        <div class="toolbar">
            <input class="search-input" id="filterInput" placeholder="🔍 筛选股票..." oninput="renderCards()" style="max-width:250px;">
            <div class="dir-tabs" id="dirTabs" style="flex:1;"></div>
        </div>

        <!-- 卡片区 -->
        <div class="cards-area" id="cardsArea"><div class="loading"><div class="spinner"></div></div></div>
    </div>
    <div class="footer">自选股管理</div>
    <div id="toast" class="toast"></div>
    <div id="nav-bottom"></div>
    <script src="/js/config.js"></script>
    <script src="/js/nav.js?v=5"></script>
    <script src="/js/stock_card.js?v=5"></script>
<script src="/js/pages/watchlist.js?v=1"></script>
</body>
</html>
