<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📋 持仓管理 · 私密</title>
<style>
/* ── 加载/错误/空状态 ── */
.loading-state, .error-state { text-align: center; padding: 60px 20px; color: #666; font-size: 14px; }
.error-state { color: #e94560; }
.empty-state { text-align: center; padding: 40px 20px; color: #666; }
.empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; margin-bottom: 16px; }
.footer { text-align: center; padding: 20px; color: #444; font-size: 11px; }

/* ── 卡片外框（仿自选股风格）── */
.watchlist-card-wrapper {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border: 0 solid #2a2a4e;
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
}
.watchlist-card-wrapper .stock-item {
    background: transparent !important;
    border-left: none !important;
    border-bottom: 1px solid #2a2a4e;
    border-radius: 0 !important;
    padding: 12px 14px 10px;
}
.watchlist-card-actions {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 14px;
    background: rgba(0,0,0,0.15);
}
.watchlist-card-actions .wca-left {
    display: flex; align-items: center; gap: 8px;
}
</style>
  <link rel="stylesheet" crossorigin href="/assets/holdings-DBzKqoQh.css">
  <link rel="stylesheet" crossorigin href="/assets/stock_card-Bt821oyZ.css">
</head>
<body>

<div class="header">
    <h1>📋 持仓管理 · 私密</h1>
    <div class="update-time" id="updateTime">加载中...</div>
</div>
<div class="container" id="app">

    <!-- 股票概况（饼图+方向+评估合并） -->
    <div class="overview-block" id="overviewArea" style="display:none;">
        <div class="ov-title">📊 股票概况</div>
        <div class="ov-body">
            <div class="ov-pie" id="pieContainer"></div>
            <div class="ov-legend" id="pieLegend"></div>
            <div class="ov-assessment" id="ovAssessment"></div>
        </div>
        <div class="ov-stats" id="ovStats"></div>
    </div>

    <!-- 加载状态 -->
    <div class="loading-state" id="loadingState">⌛ 加载持仓数据...</div>
    <div class="error-state" id="errorState" style="display:none;"></div>

    <!-- 卡片区（可折叠） -->
    <div id="cardArea" style="display:none;">
        <div class="card-section-header" onclick="toggleCardSection()">
            <span id="cardToggleIcon">▼</span>
            <span>个股信息 <span id="cardCount" style="color:#888;font-size:12px;"></span></span>
            <button class="add-btn-sm" onclick="event.stopPropagation();openAddModal()">＋ 新增</button>
        </div>
        <div id="cardBody">
            <div id="cardList"></div>
        </div>
    </div>

    <!-- 空状态 -->
    <div class="empty-state" id="emptyState" style="display:none;">
        <div class="empty-icon">📭</div>
        <p>暂无持仓，点击下方按钮添加</p>
        <button class="add-btn" onclick="openAddModal()">＋ 新增第一只持仓</button>
    </div>

    <!-- 建议（独立） -->
    <div class="section-card" id="suggestionSection" style="display:none;">
        <div class="section-title suggestion">📋 持仓建议</div>
        <div id="suggestionContent"></div>
    </div>

</div>
<div class="footer">仅你可见 · URL 请保密</div>

<script src="/js/stock_card.js"></script>
<!-- ── 新增/编辑弹窗 ── -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
        <h2 id="modalTitle">新增持仓</h2>
        <input type="hidden" id="editIndex" value="-1">

        <div class="form-row">
            <label>搜索股票</label>
            <input type="text" id="stockSearch" placeholder="输入股票名称或代码..." autocomplete="off">
            <div class="search-results" id="searchResults"></div>
        </div>

        <div class="form-row">
            <label>选中股票</label>
            <div style="display:flex; gap:12px; align-items:center;" id="selectedStockInfo">
                <span id="selectedName" style="font-weight:600;color:#e0e0e0;">-</span>
                <span id="selectedCode" style="color:#666;font-size:11px;">-</span>
            </div>
            <div class="price-display" id="selectedPrice">--</div>
        </div>

        <div class="form-row">
            <label>方向</label>
            <select id="directionSelect"><option value="">请选择方向</option></select>
        </div>

        <div class="form-row">
            <label>仓位 (%)</label>
            <input type="number" id="ratioInput" step="0.01" min="0" max="100" placeholder="0.00">
        </div>

        <div class="form-row">
            <label>止损价 (元) — <span style="color:#888;">不填则不设止损</span></label>
            <input type="number" id="stopLossInput" step="0.01" min="0" placeholder="0.00" oninput="calcStopLossPct()">
            <div class="hint" id="stopLossHint"></div>
        </div>

        <div class="btn-row">
            <button class="btn-cancel" onclick="closeModal()">取消</button>
            <button class="btn-save" id="saveBtn" onclick="saveModal()">保存</button>
        </div>
    </div>
</div>

<!-- ── 确认删除弹窗 ── -->
<div class="modal-overlay" id="confirmOverlay">
    <div class="modal" style="width:320px;">
        <div class="confirm-box">
            <p id="confirmText">确定要删除该持仓吗？</p>
            <div class="btn-row">
                <button class="btn-cancel" onclick="closeConfirm()">取消</button>
                <button class="btn-save" onclick="confirmDelete()" style="background:#e94560;">删除</button>
            </div>
        </div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// 状态
// ═══════════════════════════════════════════════════════════════
let HOLDINGS_DATA = null;
let DELETE_INDEX = -1;
let SELECTED_STOCK = null;
let cachedPrices = {};

const PIE_COLORS = [
    '#e94560', '#2196f3', '#4CAF50', '#ff9800', '#a855f7',
    '#00bcd4', '#ff5722', '#8bc34a', '#e91e63', '#3f51b5',
    '#009688', '#ffeb3b', '#9c27b0', '#795548', '#607d8b',
];

// ═══════════════════════════════════════════════════════════════
// 加载数据
// ═══════════════════════════════════════════════════════════════
async function loadData() {
    const ls = document.getElementById('loadingState');
    const es = document.getElementById('errorState');
    const ca = document.getElementById('cardArea');
    const em = document.getElementById('emptyState');
    const oa = document.getElementById('overviewArea');
    const ss = document.getElementById('suggestionSection');
    const ut = document.getElementById('updateTime');

    ls.style.display = 'block';
    ca.style.display = 'none';
    em.style.display = 'none';
    es.style.display = 'none';
    oa.style.display = 'none';
    ss.style.display = 'none';

    try {
        const resp = await fetch('/api/holdings?_=' + Date.now());
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();

        HOLDINGS_DATA = data;

        ut.textContent = '📅 更新于 ' + (data.update_date || '未知');
        const holdings = data.holdings || [];
        const cash = data.cash_ratio || 100;

        if (holdings.length === 0) {
            ls.style.display = 'none';
            em.style.display = 'block';
            return renderAssessment(data);
        }

        // 股票概况（合并统计+方向分布）
        oa.style.display = 'block';
        const totalRatio = (100 - cash).toFixed(1);
        let maxR = 0;
        holdings.forEach(h => { if (h.ratio > maxR) maxR = h.ratio; });
        document.getElementById('ovStats').innerHTML =
            `<span>📈 股票 <b>${holdings.length}</b> 只</span>` +
            `<span>总仓位 <b>${totalRatio}%</b></span>` +
            `<span>现金 <b>${cash.toFixed(1)}%</b></span>` +
            `<span>最大单只 <b>${maxR.toFixed(1)}%</b></span>`;

        // 卡片
        ls.style.display = 'none';
        ca.style.display = 'block';
        renderCards(holdings);

        // 饼图 + 概况评估（合并到股票概况块）
        renderPie(holdings, data);
        renderSuggestions(data);

    } catch (err) {
        ls.style.display = 'none';
        es.style.display = 'block';
        es.textContent = '❌ 加载失败: ' + err.message;
        ut.textContent = '⚠️ 加载失败';
    }
}

// ═══════════════════════════════════════════════════════════════
// 渲染卡片
// ═══════════════════════════════════════════════════════════════
function renderCards(holdings) {
    const list = document.getElementById('cardList');
    const stageColors = {
        '上行': '#4ecdc4', '加速': '#e94560', '缩量整理': '#ffd700', '滞涨': '#ff6b6b',
        '转弱': '#ff6b6b', '下行': '#666', '加速跌': '#e94560', '转强': '#4ecdc4',
        '区间底部': '#4ecdc4', '区间中段': '#ffd700', '区间顶部': '#e94560'
    };

    // 按涨幅降序排列（保留原始索引用于编辑/删除）
    const indexed = holdings.map((h, i) => ({ idx: i, item: h }));
    indexed.sort((a, b) => (b.item.change ?? -999) - (a.item.change ?? -999));

    document.getElementById('cardCount').textContent = '(' + holdings.length + '只)';

    list.innerHTML = indexed.map(({ idx: origIdx, item: h }, i) => {
        const cardData = {
            name: h.name, code: h.code, price: h.price, change: h.change,
            signal: 'hold',
            stage: h.stage || '--',
            structure: h.structure || '--',
            sector: h.sector || '--',
            direction: h.direction || '',
            stop_loss: h.stop_loss_price, stop_loss_pct: h.stop_loss_pct,
            buy_point: '', trading_system: '3l', trading_reason: '持仓管理',
            profit_model1: false, trend_stock: false,
        };
        // 根据结构/阶段推断操作信号
        if (h.structure === '上涨趋势' && (h.stage === '上行' || h.stage === '缩量整理')) {
            cardData.signal = 'hold';
        } else if (h.structure === '上涨趋势' && h.stage === '加速') {
            cardData.signal = 'buy';
        } else if (h.structure === '下降趋势' || h.stage === '转弱' || h.stage === '滞涨' || h.stage === '下行') {
            cardData.signal = 'sell';
        } else if (h.structure === '区间震荡' && h.stage === '区间底部') {
            cardData.signal = 'buy';
        }

        const cardHtml = signalStockCard(cardData, i);
        const leftColor = stageColors[cardData.stage] || '#888';
        const barColor = h.ratio >= 10 ? '#e94560' : h.ratio >= 6 ? '#ffd700' : '#4ecdc4';

        return `<div class="watchlist-card-wrapper" style="border-left:3px solid ${leftColor};border-radius:12px 0 0 12px;">
            ${cardHtml}
            <div class="watchlist-card-actions">
                <div class="wca-left">
                    <span style="color:#ffd700;font-weight:600;font-size:12px;">仓位: ${(h.ratio || 0).toFixed(2)}%</span>
                    <span style="background:#2a2a4e;border-radius:6px;height:6px;width:60px;display:inline-block;vertical-align:middle;">
                        <span style="display:inline-block;height:6px;border-radius:6px;width:${Math.min(h.ratio, 100)}%;background:${barColor};vertical-align:middle;"></span>
                    </span>
                </div>
                <div style="display:flex;gap:4px;">
                    <button onclick="openEditModal(${origIdx})" style="background:rgba(233,69,96,0.15);border:1px solid #e94560;border-radius:6px;color:#e94560;cursor:pointer;padding:3px 10px;font-size:12px;">✏️ 编辑</button>
                    <button onclick="openDeleteConfirm(${origIdx})" style="background:rgba(233,69,96,0.15);border:1px solid #e94560;border-radius:6px;color:#e94560;cursor:pointer;padding:3px 10px;font-size:12px;">🗑️ 删除</button>
                </div>
            </div>
        </div>`;
    }).join('');
}

// ═══════════════════════════════════════════════════════════════
// 饼图（复用 top_gainers 的 SVG 方案）
// ═══════════════════════════════════════════════════════════════
function renderPie(holdings, assessmentData) {
    if (!holdings || holdings.length === 0) {
        document.getElementById('pieContainer').innerHTML = '';
        document.getElementById('pieLegend').innerHTML = '';
        document.getElementById('ovAssessment').innerHTML = '';
        return;
    }

    const cashRatio = (assessmentData && assessmentData.cash_ratio) || 0;

    // 按方向汇总仓位
    const dirMap = {};
    holdings.forEach(h => {
        const d = h.direction || '其他';
        if (!dirMap[d]) dirMap[d] = { ratio: 0, count: 0 };
        dirMap[d].ratio += h.ratio || 0;
        dirMap[d].count += 1;
    });

    // 追加现金
    if (cashRatio > 0) {
        dirMap['现金'] = { ratio: cashRatio, count: 0 };
    }

    const pieData = Object.entries(dirMap)
        .map(([name, v]) => ({ name, count: v.count, pct: parseFloat(v.ratio.toFixed(1)) }))
        .sort((a, b) => b.pct - a.pct);

    const total = pieData.reduce((s, d) => s + d.pct, 0);
    const svgW = 220, svgH = 220, cx = 110, cy = 110, r = 85;

    let startAngle = -90;
    let paths = '';
    let legendHtml = '';

    pieData.forEach((d, i) => {
        const angle = (d.pct / total) * 360;
        const endAngle = startAngle + angle;
        const color = d.name === '现金' ? '#666' : PIE_COLORS[i % PIE_COLORS.length];

        const sRad = startAngle * Math.PI / 180;
        const eRad = endAngle * Math.PI / 180;
        const x1 = cx + r * Math.cos(sRad);
        const y1 = cy + r * Math.sin(sRad);
        const x2 = cx + r * Math.cos(eRad);
        const y2 = cy + r * Math.sin(eRad);
        const largeArc = angle > 180 ? 1 : 0;
        const path = `M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${largeArc},1 ${x2},${y2} Z`;
        paths += `<path d="${path}" fill="${color}" stroke="#1a1a2e" stroke-width="1.5" opacity="0.9"/>`;

        const labelAngle = (startAngle + endAngle) / 2;
        const lRad = labelAngle * Math.PI / 180;
        const textR = r * 0.65;
        const tx = cx + textR * Math.cos(lRad);
        const ty = cy + textR * Math.sin(lRad);
        if (d.pct >= 5) {
            paths += `<text x="${tx}" y="${ty}" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#fff" font-weight="600">${d.pct.toFixed(0)}%</text>`;
        }

        const countDisplay = d.count > 0 ? d.count + '只' : '';
        legendHtml += `<div class="legend-item">
            <div class="legend-dot" style="background:${color}"></div>
            <span class="legend-name">${d.name}</span>
            ${countDisplay ? `<span class="legend-count">${countDisplay}</span>` : '<span class="legend-count"></span>'}
            <span class="legend-pct">${d.pct}%</span>
        </div>`;

        startAngle = endAngle;
    });

    paths += `<circle cx="${cx}" cy="${cy}" r="32" fill="#0f0f1a" stroke="#2a2a4e" stroke-width="1"/>
        <text x="${cx}" y="${cy - 4}" text-anchor="middle" font-size="17" font-weight="700" fill="#e94560">${holdings.length}</text>
        <text x="${cx}" y="${cy + 10}" text-anchor="middle" font-size="9" fill="#888">只个股</text>`;

    document.getElementById('pieContainer').innerHTML = `<svg width="100%" height="100%" viewBox="0 0 ${svgW} ${svgH}" style="max-width:220px;max-height:220px;">${paths}</svg>`;
    document.getElementById('pieLegend').innerHTML = legendHtml;

    // ── 右侧：持仓评估概览 ──
    const totalRatio = 100 - cashRatio;
    const assessItems = [];

    // 1. 总仓位
    if (totalRatio > 80) {
        assessItems.push({ text: `总仓位 ${totalRatio.toFixed(1)}%`, cls: 'high' });
    } else if (totalRatio < 50) {
        assessItems.push({ text: `总仓位 ${totalRatio.toFixed(1)}%`, cls: 'medium' });
    } else {
        assessItems.push({ text: `总仓位 ${totalRatio.toFixed(1)}%`, cls: 'low' });
    }

    // 2. 最大单只集中
    let maxR = 0, maxName = '';
    holdings.forEach(h => { if (h.ratio > maxR) { maxR = h.ratio; maxName = h.name; } });
    if (maxR >= 15) {
        assessItems.push({ text: `${maxName} ${maxR}%`, cls: 'high' });
    } else if (maxR >= 10) {
        assessItems.push({ text: `${maxName} ${maxR}%`, cls: 'medium' });
    }

    // 3. 方向集中度
    const assessDirMap = {};
    holdings.forEach(h => {
        const d = h.direction || '其他';
        assessDirMap[d] = (assessDirMap[d] || 0) + (h.ratio || 0);
    });
    Object.entries(assessDirMap).forEach(([dir, ratio]) => {
        if (ratio >= 40) {
            assessItems.push({ text: `${dir} ${ratio.toFixed(1)}% 集中`, cls: 'high' });
        } else if (ratio >= 30) {
            assessItems.push({ text: `${dir} ${ratio.toFixed(1)}% 集中`, cls: 'medium' });
        }
    });

    // 4. 现金
    if (cashRatio < 5) {
        assessItems.push({ text: `现金 ${cashRatio.toFixed(1)}%`, cls: 'high' });
    } else if (cashRatio > 40) {
        assessItems.push({ text: `现金 ${cashRatio.toFixed(1)}%`, cls: 'medium' });
    } else {
        assessItems.push({ text: `现金 ${cashRatio.toFixed(1)}%`, cls: 'low' });
    }

    // 去重：方向集中和总仓位只显示最严重的前2条
    const critical = assessItems.filter(x => x.cls === 'high').slice(0, 2);
    const warnings = assessItems.filter(x => x.cls === 'medium').slice(0, 2);
    const ok = assessItems.filter(x => x.cls === 'low').slice(0, 2);
    const ordered = [...critical, ...warnings, ...ok];

    const iconMap = { high: '🔴', medium: '⚠️', low: '✅' };
    document.getElementById('ovAssessment').innerHTML =
        '<div class="oa-title">持仓评估</div>' +
        ordered.map(it =>
            `<div class="oa-item ${it.cls}">${iconMap[it.cls]} ${it.text}</div>`
        ).join('');
}

// ═══════════════════════════════════════════════════════════════
// 持仓建议（独立区块）
// ═══════════════════════════════════════════════════════════════
function renderSuggestions(data) {
    const holdings = data.holdings || [];
    const cashRatio = data.cash_ratio || 100;
    const totalRatio = 100 - cashRatio;

    const ss = document.getElementById('suggestionSection');
    const sc = document.getElementById('suggestionContent');

    const suggestions = [];

    // 1. 总仓位
    if (totalRatio > 80) {
        suggestions.push(`建议适当减仓，控制总仓位在建议范围内`);
    } else if (totalRatio < 50) {
        suggestions.push(`当前仓位偏低，可在主线确认后适当加仓`);
    }

    // 2. 单只集中度
    holdings.forEach(h => {
        if (h.ratio >= 15) {
            suggestions.push(`${h.name} 仓位过高，若跌破止损需果断减仓`);
        } else if (h.ratio >= 10) {
            suggestions.push(`${h.name} 仓位超过10%，注意分散风险`);
        }
    });

    // 3. 方向集中度
    const dirMap = {};
    holdings.forEach(h => {
        const d = h.direction || '其他';
        dirMap[d] = (dirMap[d] || 0) + (h.ratio || 0);
    });
    Object.entries(dirMap).forEach(([dir, ratio]) => {
        if (ratio >= 40) {
            suggestions.push(`${dir} 方向占比过高，建议减仓分散`);
        } else if (ratio >= 30) {
            suggestions.push(`${dir} 方向 ${holdings.filter(h => (h.direction||'其他')===dir).length} 只标的，可考虑聚焦核心`);
        }
    });

    // 4. 现金
    if (cashRatio < 5) {
        suggestions.push(`现金不足5%，考虑适当减仓预留调仓空间`);
    } else if (cashRatio > 40) {
        suggestions.push(`现金较多，可在板块回调时择机加仓`);
    }

    // 5. 方向数量
    const dirCount = Object.keys(dirMap).length;
    if (dirCount > 5) {
        suggestions.push(`涉及 ${dirCount} 个方向，考虑聚焦主营方向`);
    }

    if (suggestions.length > 0) {
        ss.style.display = 'block';
        sc.innerHTML = suggestions.map(s => `<div class="item">💡 ${s}</div>`).join('');
    } else {
        ss.style.display = 'none';
    }
}

// ═══════════════════════════════════════════════════════════════
// 新增 / 编辑 弹窗
// ═══════════════════════════════════════════════════════════════
function openAddModal() {
    document.getElementById('modalTitle').textContent = '新增持仓';
    document.getElementById('editIndex').value = '-1';
    resetModal();
    document.getElementById('stockSearch').style.display = 'block';
    document.getElementById('searchResults').style.display = 'none';
    document.getElementById('modalOverlay').classList.add('active');
    loadDirections();
}

function openEditModal(index) {
    const h = HOLDINGS_DATA.holdings[index];
    document.getElementById('modalTitle').textContent = '编辑持仓';
    document.getElementById('editIndex').value = index;
    resetModal();

    // 编辑时直接填充已知的股票信息，不需要搜索
    const searchRow = document.getElementById('stockSearch').parentElement;
    searchRow.style.display = 'none';

    SELECTED_STOCK = { name: h.name, code: h.code };
    document.getElementById('selectedName').textContent = h.name;
    document.getElementById('selectedCode').textContent = h.code;
    document.getElementById('ratioInput').value = h.ratio || '';
    document.getElementById('stopLossInput').value = h.stop_loss_price || '';

    // 获取实时价并显示
    const p = h.price;
    if (p && p > 0) {
        cachedPrices[h.code] = p;
        document.getElementById('selectedPrice').textContent = p.toFixed(2) + ' 元';
    } else {
        document.getElementById('selectedPrice').textContent = '价格获取中...';
    }
    calcStopLossPct();

    loadDirections().then(() => {
        document.getElementById('directionSelect').value = h.direction || '';
    });

    document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
}

function resetModal() {
    SELECTED_STOCK = null;
    document.getElementById('stockSearch').value = '';
    document.getElementById('selectedName').textContent = '-';
    document.getElementById('selectedCode').textContent = '-';
    document.getElementById('selectedPrice').textContent = '--';
    document.getElementById('ratioInput').value = '';
    document.getElementById('stopLossInput').value = '';
    document.getElementById('stopLossHint').textContent = '';
    document.getElementById('searchResults').style.display = 'none';
    document.getElementById('searchResults').innerHTML = '';
}

// ═══════════════════════════════════════════════════════════════
// 搜索股票
// ═══════════════════════════════════════════════════════════════
let searchTimer = null;
document.getElementById('stockSearch').addEventListener('input', function() {
    clearTimeout(searchTimer);
    const q = this.value.trim();
    if (q.length < 1) {
        document.getElementById('searchResults').style.display = 'none';
        return;
    }
    searchTimer = setTimeout(() => searchStocks(q), 300);
});

async function searchStocks(q) {
    const el = document.getElementById('searchResults');
    try {
        const resp = await fetch('/api/directions/stocks?q=' + encodeURIComponent(q));
        const data = await resp.json();
        const results = data.stocks || [];
        if (results.length === 0) {
            el.style.display = 'none';
            return;
        }
        el.innerHTML = results.slice(0, 10).map(s =>
            `<div class="result-item" onclick="selectStock('${s.name}', '${s.code}', ${s.price || 0})">
                <span>${s.name} <span style="color:#4ecdc4;font-size:11px;">${s.price ? s.price.toFixed(2) : ''}</span></span>
                <span class="ri-code">${s.code}</span>
            </div>`
        ).join('');
        el.style.display = 'block';
    } catch (err) {
        el.style.display = 'none';
    }
}

function selectStock(name, code, price) {
    SELECTED_STOCK = { name, code };
    document.getElementById('selectedName').textContent = name;
    document.getElementById('selectedCode').textContent = code;
    document.getElementById('stockSearch').value = name;
    document.getElementById('searchResults').style.display = 'none';

    if (price && price > 0) {
        cachedPrices[code] = price;
        document.getElementById('selectedPrice').textContent = price.toFixed(2) + ' 元';
    } else {
        document.getElementById('selectedPrice').textContent = '价格获取中...';
    }
    calcStopLossPct();
}

// ═══════════════════════════════════════════════════════════════
// 止损计算
// ═══════════════════════════════════════════════════════════════
function calcStopLossPct() {
    const slInput = document.getElementById('stopLossInput');
    const hint = document.getElementById('stopLossHint');
    const code = SELECTED_STOCK ? SELECTED_STOCK.code : '';
    const currentPrice = cachedPrices[code] || null;

    const slVal = parseFloat(slInput.value);
    if (!isNaN(slVal) && currentPrice !== null && currentPrice > 0) {
        const pct = ((slVal - currentPrice) / currentPrice * 100);
        const color = Math.abs(pct) > 8 ? '#e94560' : Math.abs(pct) > 5 ? '#ffd700' : '#4ecdc4';
        hint.innerHTML = `→ 止损跌幅 <span style="color:${color}">${pct.toFixed(2)}%</span>（当前价 ${currentPrice.toFixed(2)}）`;
        hint.className = 'hint';
    } else if (!isNaN(slVal) && currentPrice === null) {
        hint.textContent = '当前价获取中，请稍后或手动填写';
        hint.className = 'hint danger';
    } else {
        hint.textContent = '';
    }
}

// ═══════════════════════════════════════════════════════════════
// 方向下拉
// ═══════════════════════════════════════════════════════════════
async function loadDirections() {
    const sel = document.getElementById('directionSelect');
    sel.innerHTML = '<option value="">请选择方向</option>';
    try {
        const resp = await fetch('/api/directions/get');
        const data = await resp.json();
        const dirs = data.directions || {};
        // 显示所有方向（不论是否已启用）
        Object.entries(dirs).forEach(([name, active]) => {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name + (active ? '' : ' (未追踪)');
            sel.appendChild(opt);
        });
    } catch (err) {
        console.error('方向加载失败:', err);
    }
}

// ═══════════════════════════════════════════════════════════════
// 保存
// ═══════════════════════════════════════════════════════════════
async function saveModal() {
    const idx = parseInt(document.getElementById('editIndex').value);
    const direction = document.getElementById('directionSelect').value;
    const ratio = parseFloat(document.getElementById('ratioInput').value);
    const slInput = document.getElementById('stopLossInput').value.trim();
    const stopLossPrice = slInput !== '' ? parseFloat(slInput) : null;

    if (!SELECTED_STOCK) { alert('请选择股票'); return; }
    if (!direction) { alert('请选择方向'); return; }
    if (isNaN(ratio) || ratio <= 0) { alert('请输入有效仓位比例'); return; }
    if (stopLossPrice !== null && (isNaN(stopLossPrice) || stopLossPrice <= 0)) { alert('请输入有效止损价'); return; }

    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.textContent = '保存中...';

    try {
        let holdings = [...(HOLDINGS_DATA.holdings || [])];
        const item = {
            name: SELECTED_STOCK.name,
            code: SELECTED_STOCK.code,
            ratio: ratio,
            direction: direction,
            stop_loss_price: stopLossPrice,
        };

        if (idx >= 0 && idx < holdings.length) {
            // 编辑
            holdings[idx] = item;
        } else {
            // 新增
            holdings.push(item);
        }

        // 重新计算现金
        const totalStockRatio = holdings.reduce((s, h) => s + (h.ratio || 0), 0);
        const cashRatio = Math.max(0, Math.min(100, 100 - totalStockRatio));

        const resp = await fetch('/api/holdings/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ holdings, cash_ratio: parseFloat(cashRatio.toFixed(2)) }),
        });
        const result = await resp.json();

        if (result.success) {
            closeModal();
            loadData();
        } else {
            alert('保存失败: ' + (result.error || '未知错误'));
        }
    } catch (err) {
        alert('保存失败: ' + err.message);
    } finally {
        btn.disabled = false;
        btn.textContent = '保存';
    }
}

// ═══════════════════════════════════════════════════════════════
// 删除
// ═══════════════════════════════════════════════════════════════
function openDeleteConfirm(index) {
    DELETE_INDEX = index;
    const h = HOLDINGS_DATA.holdings[index];
    document.getElementById('confirmText').textContent = `确定要删除「${h.name}」吗？`;
    document.getElementById('confirmOverlay').classList.add('active');
}

function closeConfirm() {
    document.getElementById('confirmOverlay').classList.remove('active');
    DELETE_INDEX = -1;
}

async function confirmDelete() {
    if (DELETE_INDEX < 0) return;

    try {
        let holdings = [...(HOLDINGS_DATA.holdings || [])];
        holdings.splice(DELETE_INDEX, 1);

        const totalStockRatio = holdings.reduce((s, h) => s + (h.ratio || 0), 0);
        const cashRatio = Math.max(0, Math.min(100, 100 - totalStockRatio));

        const resp = await fetch('/api/holdings/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ holdings, cash_ratio: parseFloat(cashRatio.toFixed(2)) }),
        });
        const result = await resp.json();

        if (result.success) {
            closeConfirm();
            loadData();
        } else {
            alert('删除失败: ' + (result.error || '未知错误'));
        }
    } catch (err) {
        alert('删除失败: ' + err.message);
    }
}

// ═══════════════════════════════════════════════════════════════
// 键盘事件
// ═══════════════════════════════════════════════════════════════
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        closeModal();
        closeConfirm();
    }
});

// ═══════════════════════════════════════════════════════════════
// 可折叠卡片区
// ═══════════════════════════════════════════════════════════════
let CARD_COLLAPSED = false;

function toggleCardSection() {
    CARD_COLLAPSED = !CARD_COLLAPSED;
    document.getElementById('cardBody').style.display = CARD_COLLAPSED ? 'none' : 'block';
    document.getElementById('cardToggleIcon').textContent = CARD_COLLAPSED ? '▶' : '▼';
}

// ═══════════════════════════════════════════════════════════════
// 启动
// ═══════════════════════════════════════════════════════════════
loadData();
</script>
