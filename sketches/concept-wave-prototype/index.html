<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>概念板块波谷追踪 v5 — 原型</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"PingFang SC","Noto Sans SC",sans-serif;background:#13141f;color:#e0e0e0;padding:20px;display:flex;justify-content:center}
.container{max-width:900px;width:100%}

.header{background:#1a1b2e;padding:12px 20px;border-radius:8px;margin-bottom:8px}
.header h1{font-size:20px;font-weight:600;color:#fff}
.header .date-row{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.header .date-row span{color:#888;font-size:13px}
.header .date-row .btn{background:#2a2b4e;color:#e0e0e0;border:none;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:12px}

.subtitle{font-size:13px;color:#888;margin-bottom:8px;padding:0 4px}
.subtitle span{color:#e03131;font-weight:600}

.chart-section{background:#1a1b2e;border-radius:8px;padding:12px;position:relative}

/* Today line */
.today-line{position:absolute;left:460px;top:10px;bottom:10px;width:2px;background:#e03131;z-index:2}
.today-label{position:absolute;left:445px;top:2px;color:#e03131;font-size:11px;font-weight:600;z-index:3}

/* Group header */
.group-header{display:flex;align-items:center;padding:6px 0 4px;font-size:14px;font-weight:600;letter-spacing:2px}
.group-header.trough{color:#2b8a3e}
.group-header.mid{color:#e67700}
.group-header.down{color:#e03131}
.group-header .bar{flex:1;height:1px;margin-left:10px}
.group-header.trough .bar{background:#2b8a3e}
.group-header.mid .bar{background:#e67700}
.group-header.down .bar{background:#e03131}

/* Concept row */
.concept-row{display:flex;align-items:center;padding:3px 0;border-bottom:1px solid #2a2b3e;min-height:48px}
.concept-row:last-child{border-bottom:none}

.concept-left{width:150px;flex-shrink:0;display:flex;align-items:center;gap:6px}
.concept-left .tag{width:6px;height:20px;border-radius:2px;flex-shrink:0}
.concept-left .tag.gold{background:#e67700}
.concept-left .tag.silver{background:#868e96}
.concept-left .name{font-size:15px;font-weight:500;color:#e0e0e0}
.concept-left .vl{font-size:12px;color:#888;margin-left:4px}
.concept-left .vl.high{color:#e67700;font-weight:600}

.concept-chart{flex:1;min-width:0;height:38px;position:relative;margin:0 8px}

.concept-chart svg{width:100%;height:100%}
.concept-chart .wave-line{fill:none;stroke:#2b8a3e;stroke-width:1.5;vector-effect:non-scaling-stroke}
.concept-chart .index-line{fill:none;stroke:#555;stroke-width:1;stroke-dasharray:4,3;vector-effect:non-scaling-stroke}
.concept-chart .marker{font-size:9px;font-family:inherit;text-anchor:middle}
.marker.shrink{fill:#2b8a3e}
.marker.volume{fill:#e8590c}
.marker.warn{fill:#e03131}
.marker.entry{fill:#2b8a3e}
.concept-chart .peak-dot{fill:#e03131;r:3}
.concept-chart .trough-dot{fill:#2b8a3e;r:3}
.concept-chart .rotation-arrow{stroke:#e67700;stroke-width:1;stroke-dasharray:3,2;fill:none}
.concept-chart .rotation-label{fill:#e67700;font-size:8px;font-family:inherit}
.concept-chart .history-ref{fill:#666;font-size:8px;font-family:inherit}

.concept-right{width:60px;flex-shrink:0;text-align:center}
.concept-right .badge{font-size:11px;padding:2px 8px;border-radius:4px;display:inline-block}
.badge.trough{background:#0b2e1a;color:#2b8a3e}
.badge.mid{background:#2a2000;color:#e67700}
.badge.down{background:#2a0b0b;color:#e03131}

.collapsed{text-align:center;padding:8px;color:#666;font-size:13px;background:#1e1f33;border-radius:6px;margin:8px 0}
.collapsed span{background:#2a2b4e;padding:4px 16px;border-radius:4px;cursor:pointer}

.axis-row{display:flex;justify-content:space-between;padding:4px 8px 0;font-size:11px;color:#555}
.axis-row .today-ax{color:#e03131;font-weight:600}

.legend{display:flex;flex-wrap:wrap;gap:10px;padding:8px 4px 0;font-size:11px;color:#666}
.legend span{display:inline-flex;align-items:center;gap:3px}
.legend .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.legend .dot.gold{background:#e67700}
.legend .dot.silver{background:#868e96}
.legend .line{width:16px;height:2px;display:inline-block}
.legend .line.green{background:#2b8a3e}
.legend .line.dashed{background:transparent;border-top:2px dashed #555}
</style>
</head>
<body>
<div class="container">

<div class="header">
  <h1>概念板块波谷追踪</h1>
  <div class="date-row">
    <span>2026-05-01 — 2026-05-31</span>
    <button class="btn">按阶段排序 &#x25BC;</button>
  </div>
</div>

<div class="subtitle">
  核心概念堆叠走势 <span>|</span> 竖线=今天 <span>|</span> [金]主线 [银]次线 <span>|</span> --大盘 <span>|</span> 切入窗口 <span>|</span> 轮动 <span>|</span> 历史谷峰涨幅
</div>

<div class="chart-section" id="chartSection">

<!-- Today line -->
<div class="today-line"></div>
<div class="today-label">今天</div>

<!-- ============ 波谷组 ============ -->
<div class="group-header trough">
  [ 波谷组 ]
  <div class="bar"></div>
</div>

<!-- Row 1: AI算力 [金] vl:4 波谷 -->
<div class="concept-row">
  <div class="concept-left">
    <div class="tag gold"></div>
    <span class="name">AI算力</span>
    <span class="vl high">vl:4</span>
  </div>
  <div class="concept-chart">
    <svg viewBox="0 0 440 38" preserveAspectRatio="none">
      <!-- Index dashed line -->
      <polyline class="index-line" points="0,18 40,16 80,19 120,15 160,18 200,14 240,17 280,13 320,16 360,12 400,15 440,11"/>
      <!-- Wave line -->
      <polyline class="wave-line" points="0,26 20,24 40,28 60,22 80,30 100,18 120,10 140,12 160,8 180,14 200,6 220,10 240,4 260,8 280,3 300,9 320,5 340,11 360,7 380,13 400,9 420,15 440,12"/>
      <!-- 缩量 marker -->
      <text class="marker shrink" x="150" y="20">缩量</text>
      <!-- 波谷 dot -->
      <circle class="trough-dot" cx="280" cy="3" r="3.5"/>
      <text class="marker shrink" x="280" y="0" font-size="7">波谷</text>
      <!-- 切入窗口 -->
      <text class="marker entry" x="280" y="16" font-size="8">切入窗口</text>
      <!-- 历史参考 -->
      <text class="history-ref" x="8" y="37" font-size="7">历史: 上次谷到峰 +18%</text>
    </svg>
  </div>
  <div class="concept-right">
    <span class="badge trough">波谷</span>
  </div>
</div>

<!-- ============ 波中组 ============ -->
<div class="group-header mid">
  [ 波中组 ]
  <div class="bar"></div>
</div>

<!-- Row 2: HBM概念 [银] vl:2 波中 -->
<div class="concept-row">
  <div class="concept-left">
    <div class="tag silver"></div>
    <span class="name">HBM概念</span>
    <span class="vl">vl:2</span>
  </div>
  <div class="concept-chart">
    <svg viewBox="0 0 440 38" preserveAspectRatio="none">
      <polyline class="index-line" points="0,18 40,16 80,19 120,15 160,18 200,14 240,17 280,13 320,16 360,12 400,15 440,11"/>
      <polyline class="wave-line" points="0,24 20,22 40,26 60,18 80,12 100,8 120,14 140,6 160,10 180,4 200,8 220,12 240,6 260,10 280,4 300,8 320,12 340,6 360,10 380,14 400,8 420,12 440,6" stroke="#e67700"/>
      <circle class="trough-dot" cx="140" cy="6" r="3.5"/>
      <text class="marker shrink" x="140" y="4" font-size="7">波谷</text>
      <!-- 轮动箭头 -->
      <line class="rotation-arrow" x1="220" y1="0" x2="220" y2="18"/>
      <polygon points="216,16 220,22 224,16" fill="#e67700"/>
      <text class="rotation-label" x="221" y="12" font-size="7">算力&gt;HBM</text>
      <!-- 历史参考 -->
      <text class="history-ref" x="8" y="37" font-size="7">历史: 上次谷到峰 +12%</text>
    </svg>
  </div>
  <div class="concept-right">
    <span class="badge mid">波中</span>
  </div>
</div>

<!-- Row 3: 机器人 vl:1 波中 -->
<div class="concept-row">
  <div class="concept-left">
    <span class="name">机器人</span>
    <span class="vl">vl:1</span>
  </div>
  <div class="concept-chart">
    <svg viewBox="0 0 440 38" preserveAspectRatio="none">
      <polyline class="index-line" points="0,18 40,16 80,19 120,15 160,18 200,14 240,17 280,13 320,16 360,12 400,15 440,11"/>
      <polyline class="wave-line" points="0,28 20,26 40,22 60,18 80,14 100,10 120,8 140,6 160,4 180,8 200,4 220,8 240,6 260,10 280,8 300,12 320,10 340,14 360,12 380,16 400,14 420,18 440,16" stroke="#868e96"/>
      <!-- 放量 marker -->
      <text class="marker volume" x="340" y="22">放量</text>
    </svg>
  </div>
  <div class="concept-right">
    <span class="badge mid">波中</span>
  </div>
</div>

<!-- ============ 下跌组 ============ -->
<div class="group-header down">
  [ 下跌组 ]
  <div class="bar"></div>
</div>

<!-- Row 4: 固态电池 vl:0 下跌 -->
<div class="concept-row">
  <div class="concept-left">
    <span class="name">固态电池</span>
    <span class="vl" style="color:#666">vl:0</span>
  </div>
  <div class="concept-chart">
    <svg viewBox="0 0 440 38" preserveAspectRatio="none">
      <polyline class="index-line" points="0,14 40,12 80,15 120,11 160,14 200,10 240,13 280,9 320,12 360,8 400,11 440,7"/>
      <polyline class="wave-line" points="0,22 20,24 40,26 60,28 80,24 100,20 120,24 140,28 160,30 180,32 200,28 220,30 240,34 260,30 280,32 300,36 320,32 340,34 360,30 380,32 400,28 420,30 440,26" stroke="#e03131"/>
      <!-- 天量滞涨 -->
      <text class="marker warn" x="220" y="36">天量滞涨</text>
    </svg>
  </div>
  <div class="concept-right">
    <span class="badge down">下跌</span>
  </div>
</div>

<!-- Row 5: 国产芯片 vl:1 下跌 -->
<div class="concept-row">
  <div class="concept-left">
    <span class="name">国产芯片</span>
    <span class="vl">vl:1</span>
  </div>
  <div class="concept-chart">
    <svg viewBox="0 0 440 38" preserveAspectRatio="none">
      <polyline class="index-line" points="0,16 40,14 80,17 120,13 160,16 200,12 240,15 280,11 320,14 360,10 400,13 440,9"/>
      <polyline class="wave-line" points="0,28 20,26 40,22 60,18 80,14 100,10 120,8 140,6 160,10 180,6 200,10 220,14 240,18 260,22 280,26 300,30 320,28 340,24 360,20 380,16 400,12 420,8 440,4" stroke="#e03131"/>
      <circle class="peak-dot" cx="300" cy="30" r="3.5"/>
      <text class="marker warn" x="300" y="34" font-size="7">波峰</text>
      <text class="history-ref" x="8" y="37" font-size="7">历史: 上次谷到峰 +22%</text>
    </svg>
  </div>
  <div class="concept-right">
    <span class="badge down">下跌</span>
  </div>
</div>

</div><!-- chart-section -->

<div class="collapsed">
  <span>+ 还有47个折叠</span>
</div>

<div class="axis-row">
  <span>&#8592; 30天前</span>
  <span class="today-ax">今天</span>
  <span>当前位 &#8594;</span>
</div>

<div class="legend">
  <span><span class="dot gold"></span> 主线前5</span>
  <span><span class="dot silver"></span> 主线6-10</span>
  <span><span class="line dashed"></span> 大盘水位线</span>
  <span style="color:#2b8a3e">&#9660; 缩量</span>
  <span style="color:#e8590c">&#9650; 放量</span>
  <span style="color:#e03131">&#9888; 天量滞涨</span>
  <span style="color:#2b8a3e">切入窗口</span>
  <span style="color:#e67700">轮动&#8599;</span>
  <span style="color:#868e96">历史谷峰涨幅</span>
</div>

</div><!-- container -->
</body>
</html>
