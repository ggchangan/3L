<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<style>
body {
  font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  background: #0d0d1a;
  color: #d0d0d8;
  padding: 16px 20px;
  line-height: 1.8;
  font-size: 13px;
}
h1 { color:#fff; font-size:20px; letter-spacing:1px; border-left:4px solid #2196f3; padding-left:12px; margin:8px 0 14px 0; }
h2 { color:#2196f3; font-size:16px; margin:20px 0 8px 0; padding-bottom:5px; border-bottom:1px solid #1a1a3e; }
h3 { color:#a0a0c0; font-size:14px; margin:14px 0 6px 0; }
p { margin:4px 0; }
.block { background:linear-gradient(135deg,#12122a,#1a1a3e); border:1px solid #2a2a4e; border-radius:8px; padding:10px 14px; margin:10px 0; }
.block-title { font-size:13px; color:#2196f3; font-weight:600; margin-bottom:6px; display:flex; align-items:center; gap:4px; }
table { width:100%; border-collapse:collapse; font-size:11px; margin:8px 0; }
th { background:rgba(33,150,243,0.12); color:#4a9eff; padding:6px 6px; text-align:center; border-bottom:2px solid #2a2a4e; font-weight:600; }
td { padding:5px 6px; text-align:center; border-bottom:1px solid #1a1a2e; color:#c0c0c8; }
tr:hover td { background:rgba(33,150,243,0.04); }
.tag { display:inline-block; padding:1px 6px; border-radius:3px; font-size:10px; font-weight:600; }
.tag-red { background:rgba(233,69,96,0.2); color:#e94560; }
.tag-green { background:rgba(76,175,80,0.2); color:#4CAF50; }
.tag-blue { background:rgba(33,150,243,0.2); color:#4a9eff; }
.tag-yellow { background:rgba(240,165,0,0.15); color:#f0a500; }
.tag-gray { background:rgba(255,255,255,0.06); color:#888; }
ul { padding-left:18px; }
li { margin:3px 0; }
.quote { border-left:3px solid #4a9eff; padding:6px 10px; margin:8px 0; background:rgba(33,150,243,0.04); border-radius:0 4px 4px 0; color:#a0a0c0; font-style:italic; font-size:12px; }
hr { border:none; border-top:1px solid #2a2a4e; margin:12px 0; }
.footer { text-align:center; padding:12px; color:#333; font-size:10px; }
.tier-1 { color:#4CAF50; font-weight:700; }
.tier-2 { color:#f0a500; font-weight:600; }
.tier-3 { color:#e94560; font-weight:600; }
.sig-sell { background:rgba(233,69,96,0.15); color:#e94560; padding:1px 5px; border-radius:3px; font-size:10px; }
.sig-hold { background:rgba(240,165,0,0.12); color:#f0a500; padding:1px 5px; border-radius:3px; font-size:10px; }
.sig-buy { background:rgba(76,175,80,0.15); color:#4CAF50; padding:1px 5px; border-radius:3px; font-size:10px; }
.path-card { border-radius:8px; padding:10px 14px; margin:6px 0; }
.path-1 { background:rgba(76,175,80,0.08); border:1px solid rgba(76,175,80,0.3); }
.path-2 { background:rgba(240,165,0,0.06); border:1px solid rgba(240,165,0,0.3); }
.path-3 { background:rgba(33,150,243,0.06); border:1px solid rgba(33,150,243,0.3); }
.path-title { font-size:13px; font-weight:600; margin-bottom:4px; color:#ddd; }
</style>
</head>
<body>
$body$
<div class="footer">— 基于3L交易体系 · 简放《量价原理》 —</div>
</body>
</html>
