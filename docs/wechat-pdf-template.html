<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<style>
/* ── 全局 ── */
body {
  font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  background: #ffffff;
  color: #333333;
  padding: 16px 20px;
  line-height: 1.8;
  font-size: 13px;
}
h1 {
  color: #1a1a2e;
  font-size: 20px;
  letter-spacing: 1px;
  border-left: 4px solid #2196f3;
  padding-left: 12px;
  margin: 8px 0 14px 0;
}
h2 {
  color: #1565c0;
  font-size: 16px;
  margin: 20px 0 8px 0;
  padding-bottom: 5px;
  border-bottom: 2px solid #e8eaf6;
}
h3 {
  color: #455a64;
  font-size: 14px;
  margin: 14px 0 6px 0;
}
p { margin: 4px 0; }

/* ── 卡片区块 ── */
.block {
  background: #f5f7fa;
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  padding: 10px 14px;
  margin: 10px 0;
}
.block-title {
  font-size: 13px; color: #1565c0; font-weight: 600;
  margin-bottom: 6px; display: flex; align-items: center; gap: 4px;
}

/* ── 表格 ── */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
  margin: 8px 0;
}
th {
  background: #e3f2fd;
  color: #1565c0;
  padding: 6px 6px;
  text-align: center;
  border-bottom: 2px solid #bbdefb;
  font-weight: 600;
}
td {
  padding: 5px 6px;
  text-align: center;
  border-bottom: 1px solid #e0e0e0;
  color: #444;
}
tr:nth-child(even) td { background: #fafafa; }

/* ── 标签 ── */
.tag {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 600;
}
.tag-red  { background: #ffebee; color: #c62828; }
.tag-green { background: #e8f5e9; color: #2e7d32; }
.tag-blue { background: #e3f2fd; color: #1565c0; }
.tag-yellow { background: #fff8e1; color: #e65100; }
.tag-gray { background: #f5f5f5; color: #666; }

/* ── 列表 ── */
ul { padding-left: 18px; }
li { margin: 3px 0; }

/* ── 引用 ── */
.quote {
  border-left: 3px solid #90caf9;
  padding: 6px 10px;
  margin: 8px 0;
  background: #f5f9ff;
  border-radius: 0 4px 4px 0;
  color: #555;
  font-style: italic;
  font-size: 12px;
}

/* ── 分隔 ── */
hr { border: none; border-top: 1px solid #e0e0e0; margin: 12px 0; }

/* ── 底部 ── */
.footer {
  text-align: center;
  padding: 12px;
  color: #999;
  font-size: 10px;
}

/* ── 三档标签（文字色） ── */
.tier-1 { color: #2e7d32; font-weight: 700; }
.tier-2 { color: #e65100; font-weight: 600; }
.tier-3 { color: #c62828; font-weight: 600; }

/* ── 信号标签 ── */
.sig-sell { background: #ffebee; color: #c62828; padding: 1px 5px; border-radius: 3px; font-size: 10px; }
.sig-hold { background: #fff8e1; color: #e65100; padding: 1px 5px; border-radius: 3px; font-size: 10px; }
.sig-buy { background: #e8f5e9; color: #2e7d32; padding: 1px 5px; border-radius: 3px; font-size: 10px; }

/* ── 路径卡片 ── */
.path-card {
  border-radius: 8px;
  padding: 10px 14px;
  margin: 6px 0;
}
.path-1 { background: #f1f8e9; border: 1px solid #c5e1a5; }
.path-2 { background: #fff8e1; border: 1px solid #ffe082; }
.path-3 { background: #e3f2fd; border: 1px solid #90caf9; }
.path-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #333; }
</style>
</head>
<body>
$body$
<div class="footer">— 基于3L交易体系 · 简放《量价原理》 —</div>
</body>
</html>
