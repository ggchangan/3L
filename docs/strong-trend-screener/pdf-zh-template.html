<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$title$</title>
<style>
body { font-family: "Noto Sans SC", "SimSun", "STSong", serif; font-size: 14px; line-height: 1.6; padding: 2em; }
h1 { font-size: 22px; border-bottom: 2px solid #333; padding-bottom: 8px; }
h2 { font-size: 18px; border-bottom: 1px solid #ccc; padding-bottom: 4px; margin-top: 1.5em; }
h3 { font-size: 16px; margin-top: 1.2em; }
table { border-collapse: collapse; width: 100%; margin: 1em 0; }
th, td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; }
th { background: #f5f5f5; }
code { background: #f0f0f0; padding: 1px 4px; border-radius: 3px; font-size: 13px; }
pre { background: #f5f5f5; padding: 10px; border-radius: 4px; overflow-x: auto; }
blockquote { border-left: 4px solid #ddd; margin-left: 0; padding-left: 1em; color: #666; }
a { color: #0366d6; text-decoration: underline; }
img { max-width: 100%; }
</style>
</head>
<body>
$body$
</body>
</html>
