<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3L 个股分析 · 买点检测</title>
<link rel="stylesheet" href="/css/base.css?v=1">
<link rel="stylesheet" href="/css/pages/stock_analysis.css?v=1">
    <link rel="stylesheet" href="/css/stock_card.css">
</head>
<body>
<div style="margin-top:10px;" id="nav-top"></div>
<div class="header">
    <h1>📊 个股买点检测</h1>
    <div class="sub">输入股票代码或名称，查看3L量价分析</div>
</div>
<div class="container">
    <div class="search-box">
        <input type="text" id="stockInput" placeholder="股票代码（如 688126）或名称（如 沪硅产业）" 
               onkeydown="if(event.key==='Enter') search()">
        <button id="searchBtn" onclick="search()">分析</button>
        <button id="btBtn" onclick="runBacktest()" style="padding:10px 20px;border-radius:8px;border:none;background:#4ecdc4;color:#000;font-size:14px;cursor:pointer;white-space:nowrap;">📊 回测</button>
    </div>
    <div id="resultArea">
        <div class="no-result">输入股票代码或名称开始分析</div>
    </div>
    <div id="btResultArea" style="margin-top:16px;"></div>
    <div class="hint">数据来源：all_stocks_60d.json · 3L量价择时系统</div>
</div>

<script src="/js/stock_card.js"></script>
<script src="/js/pages/stock_analysis.js?v=1"></script>
<div id="nav-bottom"></div>
<script src="/nav.js"></script>
</body>
</html>
