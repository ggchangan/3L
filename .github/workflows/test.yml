name: Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wkhtmltopdf librsvg2-bin

      - name: Create data directory
        run: |
          mkdir -p $HOME/data/3l/private
          mkdir -p $HOME/data/3l/knowledge_base

      - name: Install Python dependencies
        env:
          DATA_DIR: $HOME/data/3l
        run: |
          python -m pip install --upgrade pip -q
          pip install -r server/requirements.txt -q
          pip install pytest pytest-mock httpx -q
          pip install -e core/ -q

      - name: Test (all except API)
        env:
          DATA_DIR: $HOME/data/3l
          AUTH_USER: ci_test
          AUTH_PASS: ci_test_pass123
        run: |
          cd server && python -m pytest backend/tests/ -v
